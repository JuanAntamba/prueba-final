{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - QuickU</title>
    <link rel="stylesheet" href="{% static 'scss/css/styles.css' %}">
</head>
<body class="quicku-app login-page">

    <main class="login-container">
        <section class="login-card">
            <header class="login-card__header">
                <h1>QuickU</h1>
                <p>Delivery Interno & Economía Circular</p>
            </header>

            <form action="{% url 'login' %}" method="POST" class="login-form">
                {% csrf_token %}
                
                {% if error %}
                <div class="login-form__error">{{ error }}</div>
                {% endif %}

                <div class="login-form__group">
                    <label for="correo">Correo Universitario</label>
                    <input type="email" id="correo" name="correo" required placeholder="tu.nombre@udla.edu.ec">
                </div>

                <div class="login-form__group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="login-form__submit">Ingresar al Campus</button>
            </form>
        </section>
    </main>

</body>
</html>
